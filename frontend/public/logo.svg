<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Professional gradient background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bgGrad)" rx="40"/>
  
  <!-- Professional geometric design - stylized upward arrow/growth -->
  <g transform="translate(100, 100)">
    <!-- Left vertical bar -->
    <rect x="-28" y="-8" width="12" height="50" fill="url(#logoGrad)" rx="6"/>
    
    <!-- Center vertical bar (taller) -->
    <rect x="-8" y="-25" width="12" height="67" fill="url(#logoGrad)" rx="6"/>
    
    <!-- Right vertical bar -->
    <rect x="12" y="-8" width="12" height="50" fill="url(#logoGrad)" rx="6"/>
    
    <!-- Top accent - upward arrow point -->
    <polygon points="0,-35 -8,-15 8,-15" fill="#60a5fa"/>
  </g>
  
  <!-- Subtle border for definition -->
  <rect width="200" height="200" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3" rx="40"/>
</svg>
